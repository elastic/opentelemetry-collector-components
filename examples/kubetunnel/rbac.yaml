# Read-only RBAC for the in-cluster probe. The probe relies on this "elevated but
# read-only" permission: get/list/watch on every resource, nothing that mutates.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubetunnel-probe
  namespace: kubetunnel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubetunnel-probe-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # pods/log is a subresource covered by "*" above; listed explicitly for clarity.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubetunnel-probe-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubetunnel-probe-readonly
subjects:
  - kind: ServiceAccount
    name: kubetunnel-probe
    namespace: kubetunnel
