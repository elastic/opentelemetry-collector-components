# The in-cluster EDOT collector running the kubetunnelprobe extension (the probe).
# It uses the read-only ServiceAccount from rbac.yaml and dials OUT to the relay.
#
# The relay is an EXTERNAL, shared multi-tenant service — it never runs in the
# cluster. For the minikube demo it runs as a binary on the host, reachable from
# the cluster via host.minikube.internal; in production this is the relay's public
# address. The probe config is baked into the image's config.yaml and parameterized
# by the environment variables below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetunnel-probe
  namespace: kubetunnel
  labels: { app: kubetunnel-probe }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kubetunnel-probe }
  template:
    metadata:
      labels: { app: kubetunnel-probe }
    spec:
      serviceAccountName: kubetunnel-probe
      containers:
        - name: collector
          image: elastic-collector-components:poc
          imagePullPolicy: IfNotPresent
          env:
            # External relay on the host. 7317 is used for the demo because the
            # default 4317 is often already taken locally (OTLP); the relay port is
            # configurable via the relay's --grpc-addr.
            - name: RELAY_ENDPOINT
              value: host.minikube.internal:7317
            - name: CLUSTER_ID
              value: minikube
            # Discovery metadata via the Downward API.
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # RELAY_TOKEN: set if the relay is started with --auth-tokens.
