extensions:
  kubetunnelprobe:
    relay:
      endpoint: ${env:RELAY_ENDPOINT:-localhost:4317}
      tls:
        insecure: true
    auth_token: ${env:RELAY_TOKEN:-}
    cluster_id: ${env:CLUSTER_ID:-local}
    node_name: ${env:NODE_NAME:-}
    pod_name: ${env:POD_NAME:-}
    namespace: ${env:POD_NAMESPACE:-}
    # Empty = in-cluster config; set for out-of-cluster runs (e.g. local testing).
    kubeconfig: ${env:KUBECONFIG_PATH:-}

receivers:
  nop:

processors:
  elasticinframetrics:
    add_system_metrics:
  elasticapm:

exporters:
  nop:

connectors:

service:
  extensions: [kubetunnelprobe]
  pipelines:
    logs:
      exporters: [nop]
      processors:
      receivers: [nop]
    traces:
      exporters: [nop]
      processors:
      receivers: [nop]
    metrics:
      exporters: [nop]
      processors:
      receivers: [nop]
