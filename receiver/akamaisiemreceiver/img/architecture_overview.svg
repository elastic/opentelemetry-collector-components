<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1400" height="520" fill="#f8fafc" rx="6"/>
  <text x="700" y="24" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Akamai SIEM Receiver — Architecture Overview</text>

  <!-- ===== COL 1: Akamai Cloud ===== -->
  <rect x="30" y="140" width="160" height="140" rx="10" fill="#1e3a5f" stroke="#0f2440" stroke-width="2"/>
  <text x="110" y="164" text-anchor="middle" fill="#94b8d6" font-size="10" font-weight="600">AKAMAI CLOUD</text>
  <rect x="42" y="176" width="136" height="50" rx="6" fill="#2563eb"/>
  <text x="110" y="198" text-anchor="middle" fill="white" font-weight="700" font-size="13">SIEM API</text>
  <text x="110" y="216" text-anchor="middle" fill="#bfdbfe" font-size="9">/siem/v1/configs/{id}</text>
  <rect x="42" y="236" width="136" height="28" rx="6" fill="#7c3aed"/>
  <text x="110" y="255" text-anchor="middle" fill="white" font-weight="600" font-size="10">EdgeGrid HMAC-SHA256</text>

  <!-- ===== COL 2: Receiver ===== -->
  <rect x="240" y="40" width="420" height="430" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="450" y="64" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="700">akamai_siem receiver</text>

  <rect x="260" y="78" width="380" height="48" rx="6" fill="#2563eb"/>
  <text x="450" y="98" text-anchor="middle" fill="white" font-weight="700" font-size="13">Poller — Chain State Machine</text>
  <text x="450" y="115" text-anchor="middle" fill="#93c5fd" font-size="10">3-branch: offset drain | chain replay | new chain</text>

  <rect x="260" y="138" width="185" height="40" rx="6" fill="#0891b2"/>
  <text x="352" y="156" text-anchor="middle" fill="white" font-weight="700" font-size="11">NDJSON Parser</text>
  <text x="352" y="170" text-anchor="middle" fill="#cffafe" font-size="9">bounded channel streaming</text>

  <rect x="455" y="138" width="185" height="40" rx="6" fill="#475569"/>
  <text x="547" y="156" text-anchor="middle" fill="white" font-weight="700" font-size="11">Cursor Store</text>
  <text x="547" y="170" text-anchor="middle" fill="#cbd5e1" font-size="9">file-based, atomic write</text>

  <rect x="260" y="190" width="185" height="40" rx="6" fill="#ea580c"/>
  <text x="352" y="208" text-anchor="middle" fill="white" font-weight="700" font-size="11">Telemetry</text>
  <text x="352" y="222" text-anchor="middle" fill="#fed7aa" font-size="9">19 OTel metrics + tracing</text>

  <rect x="455" y="190" width="185" height="40" rx="6" fill="#334155"/>
  <text x="547" y="208" text-anchor="middle" fill="#94a3b8" font-weight="600" font-size="10">confighttp.ClientConfig</text>
  <text x="547" y="222" text-anchor="middle" fill="#64748b" font-size="9">TLS, proxy, timeout</text>

  <!-- MAPPING MODE SWITCH -->
  <rect x="260" y="245" width="380" height="30" rx="6" fill="#4f46e5"/>
  <text x="450" y="265" text-anchor="middle" fill="white" font-weight="700" font-size="12">output_format: raw | otel (dual: both via shared poller)</text>

  <!-- Raw Mode Box -->
  <rect x="260" y="288" width="185" height="80" rx="6" fill="#059669"/>
  <text x="352" y="306" text-anchor="middle" fill="white" font-weight="700" font-size="11">Raw Mode (default)</text>
  <text x="352" y="322" text-anchor="middle" fill="#a7f3d0" font-size="9">Raw JSON in log body</text>
  <text x="352" y="336" text-anchor="middle" fill="#a7f3d0" font-size="9">data_stream.* attributes</text>
  <text x="352" y="350" text-anchor="middle" fill="#a7f3d0" font-size="9">x-elastic-mapping-mode: ecs</text>
  <text x="352" y="362" text-anchor="middle" fill="#d1fae5" font-size="8">→ Elasticsearch + Kibana</text>

  <!-- OTel Mode Box -->
  <rect x="455" y="288" width="185" height="80" rx="6" fill="#0284c7"/>
  <text x="547" y="306" text-anchor="middle" fill="white" font-weight="700" font-size="11">OTel Mode</text>
  <text x="547" y="322" text-anchor="middle" fill="#bae6fd" font-size="9">Parsed into OTel semconv</text>
  <text x="547" y="336" text-anchor="middle" fill="#bae6fd" font-size="9">30+ structured attributes</text>
  <text x="547" y="350" text-anchor="middle" fill="#bae6fd" font-size="9">vendor-neutral output</text>
  <text x="547" y="362" text-anchor="middle" fill="#e0f2fe" font-size="8">→ Any OTel backend</text>

  <!-- plog output -->
  <rect x="260" y="382" width="380" height="28" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="450" y="401" text-anchor="middle" fill="#38bdf8" font-weight="600" font-size="11">OUTPUT: plog.Logs → ConsumeLogs()</text>

  <rect x="260" y="422" width="380" height="20" rx="4" fill="#334155"/>
  <text x="450" y="436" text-anchor="middle" fill="#94a3b8" font-size="9">Cursor, chain drain, offset recovery, telemetry — identical in all modes</text>

  <!-- ===== COL 3: Pipeline ===== -->
  <rect x="720" y="155" width="100" height="45" rx="6" fill="#8b5cf6"/>
  <text x="770" y="176" text-anchor="middle" fill="white" font-weight="700" font-size="12">Batch</text>
  <text x="770" y="192" text-anchor="middle" fill="#ddd6fe" font-size="9">Processor</text>

  <rect x="720" y="220" width="100" height="45" rx="6" fill="#dc2626"/>
  <text x="770" y="240" text-anchor="middle" fill="white" font-weight="700" font-size="11">Elasticsearch</text>
  <text x="770" y="255" text-anchor="middle" fill="#fecaca" font-size="9">Exporter</text>

  <rect x="720" y="310" width="100" height="45" rx="6" fill="#0284c7"/>
  <text x="770" y="330" text-anchor="middle" fill="white" font-weight="700" font-size="11">Any OTel</text>
  <text x="770" y="345" text-anchor="middle" fill="#bae6fd" font-size="9">Exporter</text>

  <!-- ===== COL 4: Elasticsearch ===== -->
  <rect x="880" y="80" width="340" height="220" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="1050" y="104" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">ELASTICSEARCH (ECS path)</text>

  <rect x="898" y="116" width="304" height="36" rx="5" fill="#fbbf24"/>
  <text x="1050" y="134" text-anchor="middle" fill="#451a03" font-weight="700" font-size="11">Index Template: logs-akamai.siem-*</text>
  <text x="1050" y="148" text-anchor="middle" fill="#78350f" font-size="9">sets default_pipeline on match</text>

  <rect x="898" y="162" width="304" height="46" rx="5" fill="#f59e0b"/>
  <text x="1050" y="180" text-anchor="middle" fill="#451a03" font-weight="700" font-size="11">Ingest Pipeline (triggered)</text>
  <text x="1050" y="194" text-anchor="middle" fill="#78350f" font-size="9">JSON parse | ECS map | GeoIP | base64 decode | _id fingerprint</text>

  <rect x="898" y="218" width="304" height="36" rx="5" fill="#fbbf24"/>
  <text x="1050" y="236" text-anchor="middle" fill="#451a03" font-weight="700" font-size="11">Data Stream: logs-akamai.siem-default</text>
  <text x="1050" y="250" text-anchor="middle" fill="#78350f" font-size="9">enriched ECS documents stored</text>

  <rect x="898" y="264" width="304" height="22" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1" stroke-dasharray="3"/>
  <text x="1050" y="279" text-anchor="middle" fill="#854d0e" font-size="9">installed by Akamai integration in Kibana (Fleet)</text>

  <!-- ES internal arrows -->
  <line x1="1050" y1="152" x2="1050" y2="160" stroke="#92400e" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="1050" y1="208" x2="1050" y2="216" stroke="#92400e" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== COL 4: Any Backend ===== -->
  <rect x="880" y="320" width="340" height="50" rx="10" fill="#0c4a6e" stroke="#0284c7" stroke-width="2"/>
  <text x="1050" y="344" text-anchor="middle" fill="white" font-weight="700" font-size="12">Any OTel Backend (OTel path)</text>
  <text x="1050" y="362" text-anchor="middle" fill="#7dd3fc" font-size="9">Structured OTel attributes, queryable without custom parsing</text>

  <!-- ===== Kibana ===== -->
  <rect x="1260" y="170" width="110" height="60" rx="10" fill="#ec4899" stroke="#db2777" stroke-width="2"/>
  <text x="1315" y="197" text-anchor="middle" fill="white" font-weight="700" font-size="13">Kibana</text>
  <text x="1315" y="215" text-anchor="middle" fill="#fce7f3" font-size="9">Akamai Dashboard</text>

  <!-- ====== ARROWS ====== -->
  <!-- Akamai → Receiver (NDJSON response) -->
  <polyline points="190,195 220,175 258,155" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  <text x="218" y="166" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">NDJSON</text>
  <!-- Receiver → Akamai (signed request) -->
  <polyline points="258,210 220,225 190,240" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#ah)"/>
  <text x="218" y="240" text-anchor="middle" fill="#7c3aed" font-size="8" font-weight="600">signed GET</text>

  <!-- Receiver → Batch Processor -->
  <line x1="662" y1="177" x2="718" y2="177" stroke="#38bdf8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Batch → ES Exporter -->
  <line x1="770" y1="200" x2="770" y2="218" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ES Exporter → Elasticsearch -->
  <polyline points="820,242 860,242 860,135 896,135" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ah)"/>
  <text x="870" y="188" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">ECS</text>

  <!-- Receiver → OTel Exporter -->
  <line x1="662" y1="335" x2="718" y2="335" stroke="#0284c7" stroke-width="2" marker-end="url(#ah)"/>

  <!-- OTel Exporter → Any Backend -->
  <line x1="820" y1="335" x2="878" y2="345" stroke="#0284c7" stroke-width="2" marker-end="url(#ah)"/>
  <text x="850" y="330" text-anchor="middle" fill="#0284c7" font-size="8" font-weight="600">OTel</text>

  <!-- ES → Kibana -->
  <line x1="1220" y1="200" x2="1258" y2="200" stroke="#db2777" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Caption -->
  <text x="700" y="490" text-anchor="middle" fill="#64748b" font-size="10">Raw mode: raw JSON → x-elastic-mapping-mode: ecs → ES exporter (Body → "message") → ingest pipeline → Kibana</text>
  <text x="700" y="506" text-anchor="middle" fill="#64748b" font-size="10">OTel mode: parsed into OTel semantic conventions → any OTel-compatible backend</text>
  <text x="700" y="518" text-anchor="middle" fill="#64748b" font-size="10">Dual mode: both simultaneously via shared poller — single API connection, single cursor, zero duplicate calls</text>
</svg>
