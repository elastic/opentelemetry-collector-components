elasticapmintake:

elasticapmintake/custom_batch_bytes:
  batch_bytes: 4096

elasticapmintake/custom_batch_flush_interval:
  batch_flush_interval: 100ms

elasticapmintake/disabled_batch_flush_interval:
  batch_flush_interval: 0s

elasticapmintake/custom_max_concurrent_decoders:
  max_concurrent_decoders: 256

elasticapmintake/disabled_max_concurrent_decoders:
  max_concurrent_decoders: 0

elasticapmintake/custom_max_event_size:
  max_event_size: 2048

elasticapmintake/invalid_batch_bytes:
  batch_bytes: 0

elasticapmintake/invalid_batch_flush_interval:
  batch_flush_interval: -1s

elasticapmintake/invalid_max_concurrent_decoders:
  max_concurrent_decoders: -1

elasticapmintake/invalid_max_event_size:
  max_event_size: 0

elasticapmintake/elasticsearch_agentcfg:
  agent_config:
    enabled: true
    cache_duration: 10s
    elasticsearch:
      endpoint: "http://localhost:8200"

elasticapmintake/invalid_elasticsearch_agentcfg:
  agent_config:
    enabled: true
    elasticsearch:
      endpoint: ""
