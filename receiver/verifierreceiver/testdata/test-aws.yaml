# AWS verifier test using default credentials (AWS_PROFILE or env vars)
#
# Prerequisites:
#   export AWS_PROFILE=csp   (or configure credentials via env vars)
#
# Run with:
#   ./_build/elastic-collector-components --config ./receiver/verifierreceiver/testdata/test-aws.yaml

receivers:
  verifier:
    cloud_connector_id: "cc-test-aws"
    cloud_connector_name: "AWS Test"
    verification_id: "verify-aws-001"
    verification_type: "on_demand"

    providers:
      aws:
        credentials:
          use_default_credentials: true
          default_region: "us-east-1"

    policies:
      - policy_id: "policy-aws-security"
        policy_name: "AWS Security"
        integrations:
          - integration_id: "aws-cloudtrail-001"
            integration_type: "aws_cloudtrail"
            integration_name: "AWS CloudTrail"
            integration_version: "2.17.0"
            config:
              region: "us-east-1"
          - integration_id: "aws-cspm-001"
            integration_type: "aws_cspm"
            integration_name: "AWS CSPM"
          - integration_id: "aws-asset-001"
            integration_type: "aws_asset_inventory"
            integration_name: "AWS Asset Inventory"

exporters:
  debug:
    verbosity: detailed

service:
  telemetry:
    logs:
      level: info
  pipelines:
    logs:
      receivers: [verifier]
      exporters: [debug]
