# One of 'breaking', 'deprecation', 'enhancement', 'bug_fix'
change_type: enhancement

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add `--metrics-generator` mode that runs the bundled metricsgenreceiver to produce metrics load

# It is mandatory to specify the component. Do not change this.
component: otelbench

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [https://github.com/elastic/hosted-otel-collector/issues/3341]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  When `--metrics-generator` is set, otelbench runs the collector and produces metrics based on the configuration file
  defined by `--config` of [`metricsgen`](https://github.com/elastic/metricsgenreceiver) pipeline. The distribution now bundles the
  `metricsgenreceiver`, `batch` processor, `pprof` extension, and Motel's "forked" Prometheus Remote Write
  exporter with `sending_queue` support. 
