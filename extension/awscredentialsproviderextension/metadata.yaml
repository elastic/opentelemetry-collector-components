type: awscredentialsprovider
scope_name: github.com/elastic/opentelemetry-collector-components/extension/awscredentialsproviderextension
github_project: elastic/opentelemetry-collector-components

description: |
  This extension resolves an explicit AWS identity (static keys, shared-config profile, and/or
  STS assume-role) and shares it with AWS-SDK-based components, overriding the default SDK
  credential chain those components use on their own. Credential configuration lives in one
  place instead of being duplicated per component.

status:
  class: extension
  stability:
    development: [extension]

tests:
  config:
    credentials:
      access_key_id: test_key
      secret_access_key: test_secret
