                    - key: event.outcome
                      value:
                        stringValue: success
                    - key: metricset.interval
                      value:
                        stringValue: 1m
                    - key: metricset.name
                      value:
                        stringValue: service_destination
                    - key: processor.event
                      value:
                        stringValue: metric
                    - key: service.target.name
                      value:
                        stringValue: api.example.com
                    - key: service.target.type
