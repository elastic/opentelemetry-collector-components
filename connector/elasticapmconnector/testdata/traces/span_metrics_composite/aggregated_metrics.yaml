resourceMetrics:
  - resource:
      attributes:
        - key: agent.name
          value:
            stringValue: otlp/go
        - key: deployment.environment
          value:
            stringValue: qa
        - key: service.name
          value:
            stringValue: foo
        - key: telemetry.sdk.language
          value:
            stringValue: go
    scopeMetrics:
      - metrics:
          - name: service_summary
            sum:
              aggregationTemporality: 1
              dataPoints:
                - asInt: "1"
                  attributes:
                    - key: data_stream.dataset
                      value:
                        stringValue: service_summary.1m
                    - key: metricset.interval
                      value:
                        stringValue: 1m
                    - key: metricset.name
                      value:
                        stringValue: service_summary
                    - key: processor.event
                      value:
                        stringValue: metric
                  timeUnixNano: "1000000"
          - name: service_summary
            sum:
              aggregationTemporality: 1
              dataPoints:
                - asInt: "1"
                  attributes:
                    - key: data_stream.dataset
                      value:
                        stringValue: service_summary.10m
                    - key: metricset.interval
                      value:
                        stringValue: 10m
                    - key: metricset.name
                      value:
                        stringValue: service_summary
                    - key: processor.event
                      value:
                        stringValue: metric
                  timeUnixNano: "1000000"
          - name: service_summary
