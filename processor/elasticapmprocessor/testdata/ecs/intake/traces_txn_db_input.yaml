# Represents OTLP data produced by elasticapmintakereceiver from Elastic APM agent (intake-v2) events.
# The receiver sets telemetry.sdk.name=ElasticAPM, which routes the data through the APM enricher
# path in the processor. This path differs from the OTel path: pre-existing labels.* and
# numeric_labels.* resource attributes (placed by the receiver from APM event tags) have only
# their suffix sanitized, rather than being fully re-normalized from scratch.
resourceSpans:
  - resource:
      attributes:
        - key: resource.required
          value:
            stringValue: foo
        - key: resource.optional
          value:
            stringValue: bar
        - key: telemetry.sdk.name
          value:
            stringValue: ElasticAPM
    scopeSpans:
      - scope: {}
        spans:
          - attributes:
              - key: db.name
                value:
                  stringValue: main
              - key: db.system
                value:
                  stringValue: mysql
              # processor.event pre-set by elasticapmintakereceiver; signals intake origin.
              - key: processor.event
                value:
                  stringValue: transaction
            endTimeUnixNano: "1581452773000000789"
            events:
              - attributes:
                  - key: event.attr1
                    value:
                      stringValue: foo1
                  - key: event.attr2
                    value:
                      stringValue: bar1
                name: event1
                timeUnixNano: "1581452773000000123"
              - attributes:
                  - key: event.attr1
                    value:
                      stringValue: foo2
                  - key: event.attr2
                    value:
                      stringValue: bar2
                name: event2
                timeUnixNano: "1581452773000000123"
              - name: event-with-no-attrs
                timeUnixNano: "1581452773000000123"
            name: db-elastic-txn
            parentSpanId: ""
            startTimeUnixNano: "1581452772000000321"
            spanId: abcdef0123456700
            traceId: fdedef0123456789abcdef9876543210
