# Represents OTLP data produced by elasticapmintakereceiver from Elastic APM agent (intake-v2) events.
# The receiver sets telemetry.sdk.name=ElasticAPM, which routes the data through the APM enricher
# path in the processor. This path differs from the OTel path: pre-existing labels.* and
# numeric_labels.* resource attributes (placed by the receiver from APM event tags) have only
# their suffix sanitized, rather than being fully re-normalized from scratch.
resourceLogs:
  - resource:
      attributes:
        - key: service.name
          value:
            stringValue: test-svc
        - key: telemetry.sdk.name
          value:
            stringValue: ElasticAPM
        - key: os.type
          value:
            stringValue: linux
        - key: labels.my_value
          value:
            stringValue: foo
        - key: labels.other.value
          value:
            stringValue: bar
        - key: numeric_labels.http.status.code
          value:
            doubleValue: 200
    scopeLogs:
      - scope: {}
        logRecords:
          - body:
              stringValue: intake log
            timeUnixNano: "1581452773000000789"
