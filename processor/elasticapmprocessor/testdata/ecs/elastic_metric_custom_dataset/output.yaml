resourceMetrics:
  - resource:
      attributes:
        - key: agent.name
          value:
            stringValue: ElasticAPM
        - key: agent.version
          value:
            stringValue: 1.0.0
        - key: data_stream.dataset
          value:
            stringValue: custom-metrics
        - key: data_stream.namespace
          value:
            stringValue: custom-ns
        - key: data_stream.type
          value:
            stringValue: metrics
        - key: deployment.environment
          value:
            stringValue: unset
        - key: host.ip
          value:
            stringValue: 1.2.3.4
        - key: metricset.name
          value:
            stringValue: app
        - key: service.name
          value:
            stringValue: test-service
        - key: telemetry.sdk.language
          value:
            stringValue: unknown
    scopeMetrics:
      - metrics:
          - name: system.cpu.time
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asDouble: 1.5
                  attributes:
                    - key: labels.state
                      value:
                        stringValue: user
                  timeUnixNano: "1000000"
        scope: {}
